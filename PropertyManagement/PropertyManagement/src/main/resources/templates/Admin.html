<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #f4f6f9;
            }

            .card {
                border-radius: 12px;
            }
        </style>

        <meta charset="UTF-8">
        <title>Admin Dashboard</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">


        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

        <style>
            body {
                background-color: #f4f6f9;
            }
            .sidebar {
                height: 100vh;
                background-color: #212529;
            }
            .sidebar a {
                color: #adb5bd;
                text-decoration: none;
                display: block;
                padding: 12px 20px;
            }
            .sidebar a:hover {
                background-color: #343a40;
                color: #fff;
            }
            .card {
                border-radius: 12px;
            }
        </style>
    </head>
    <body>

    <div class="container-fluid">
        <div class="row">


            <div class="col-md-2 sidebar p-0">
                <h4 class="text-white text-center py-3">Admin Panel</h4>
                <a th:href="@{|/SignUp|}">Add Admin</a>
                <a th:href="@{|/RegisterEmployee|}">Add Employee</a>

            </div>

        <div class="col-md-10 p-4">
            <h2 class="mb-3 text-center">Welcome Admin</h2>

            <div class="row justify-content-center mt-4 mb-3 p-4">
                <div class="col-md-4">
                    <div class="card shadow text-center p-4">
                        <h5>Add Admin</h5>
                        <p class="text-muted">Create and Add Admin.</p>
                        <a th:href="@{|/SignUp|}" class="btn btn-primary">
                            Add Admin
                        </a>
                    </div>
                </div>
            </div>


            <div class="row justify-content-center mt-4 mb-3 p-4">
                    <div class="col-md-4">
                    <div class="card shadow text-center p-4">
                        <h5>Add Employee</h5>
                        <p class="text-muted">Create and Add Employee.</p>
                        <a th:href="@{|/RegisterEmployee|}" class="btn btn-primary">
                            Register Employee
                        </a>
                    </div>
                    </div>
                </div>

            <div class="row justify-content-center mt-4 mb-3 p-4">
                <div class="col-md-8">
                    <div  class="card shadow text-center p-4">
                        <h5>Search Admin</h5>
                        <form th:action="@{/Search}" th:object="${admin}" method="post" class="mb-3">
                        <input type="text" id="mobile" name="mobile" placeholder="Enter Mobile">
                            <button class="btn btn-primary">Search</button>
                            <table class="table table-bordered">
                                <thead>
                                <tr>
                                    <th>AdminID</th>
                                    <th>FirstName</th>
                                    <th>LastName</th>
                                    <th>Email</th>
                                    <th>DateOfBirth</th>
                                    <th>Password</th>
                                    <th>Mobile</th>
                                    <th>Edit</th>
                                    <th>Delete</th>


                                </tr>
                                </thead>


                                <tr th:each="S : ${Text}">
                                    <td th:text="${S.AdminID}"></td>
                                    <td th:text="${S.FirstName}"></td>
                                    <td th:text="${S.LastName}"></td>
                                    <td th:text="${S.Email}"></td>
                                    <td th:text="${S.DateOfBirth}"></td>
                                    <td th:text="${S.Password}"></td>
                                    <td th:text="${S.Mobile}"></td>

                                    <td><a th:href="@{|/Edit/${S.AdminID}|}" class="btn btn-success">EDIT</a></td>
                                    <td><a th:href="@{|/Delete/${S.AdminID}|}" class="btn btn-danger">DELETE</a></td>

                                </tr>
                            </table>
                            <p th:text="${Errors}"></p>
                        </form>

                    </div>


            </div>
        </div>
            </div>
        </div>
    </div>



</body>
</html>
