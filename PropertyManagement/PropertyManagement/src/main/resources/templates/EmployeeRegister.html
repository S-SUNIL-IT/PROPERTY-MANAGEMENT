<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
                              rel="stylesheet"
                              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
                              crossorigin="anonymous">
</head>
<body>
<div class="container mt-3 text-center w-50">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-primary">
                    Employee Register
                </div>



                <div class="card-body bg-light">
                    <form th:action="@{/registersE}" th:method="post">
                        <div class="col-6">
                            <input type="hidden" id="EmployeeID" th:value="${EmployeeID}" name="EmployeeID" >
                        </div>



                        <div  class="row p-2">
                            <div class="col-6">
                                Firstname
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control w-75" id="FirstName"  name="FirstName" th:value="${FirstName}" placeholder="Enter Firstname">
                            </div>
                        </div>



                        <div class="row p-2">
                            <div class="col-6">
                                Lastname
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control w-75" id="LastName" th:value="${LastName}" name="LastName" placeholder="Enter Lastname">
                            </div>
                        </div>




                        <div class="row p-2">
                            <div class="col-6">
                                Email
                            </div>
                            <div class="col-6">
                                <input type="email" class="form-control w-75" id="Email" th:value="${Mail}" name="Email" placeholder="Enter Email">
                            </div>
                        </div>




                        <div class="row p-2">
                            <div class="col-6">
                                DateOfBirth
                            </div>
                            <div class="col-6">
                                <input type="date" class="form-control w-75" id="DateOfBirth" th:value="${DOB}" name="DateOfBirth" placeholder="Enter DateOfBirth">
                            </div>
                        </div>





                        <div class="row p-2">
                            <div class="col-6">
                                Mobile
                            </div>
                            <div class="col-6">
                                <input type="text" class= "form-control w-75" id="Mobile" th:value="${Mob}" name="Mobile" placeholder="Enter Mobile">
                            </div>
                        </div>

                        <div class="row p-2">
                            <div class = "col-6">
                                Password
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control w-75" id="Password" name="Password" th:value="${Password}" placeholder="Enter Password">
                            </div>
                        </div>

                        <div class="row p-2">
                            <div class = "col-6">
                                Salary
                            </div>
                            <div class="col-6">
                                <input type="text" class="form-control w-75" id="Salary" name="Salary" th:value="${Salary}" placeholder="Enter Salary">
                            </div>
                        </div>



                        <div class="row text-center mt-3 mb-3">
                            <div class="col-12">
                                <button class="btn btn-primary">Register</button>
                            </div>
                        </div>

                    </form>
                </div>
            </div>


        </div>


    </div>
</div>



</body>
</html>
