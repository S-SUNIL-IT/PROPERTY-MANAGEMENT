<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">

    <style>       html, body {
    height: 100%;
    margin: 0;
    padding: 0;
}

body {

    background: linear-gradient(135deg, #0f172a, #1e293b);
}

}

       .card {
    background: #ffffff;
    border-radius: 12px;
}

         .card-header {
        border-radius: 25px;
        }

    </style>

</head>
<body>
<div class="container-fluid d-flex justify-content-center align-items-center vh-100">
    <div class="col-md-4 col-lg-3">
        <div class="card shadow-lg">

            <div class="card-header bg-primary text-white text-center fw-bold">
                LOGIN
            </div>

            <div class="card-body p-4">

                <form th:action="@{/Admin}" th:method="post">
                    <div  class="row p-2">
                        <div class="col-6">
                            FirstName
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control w-75" id="FirstName"  name="FirstName" placeholder="Enter FirstName">
                        </div>
                    </div>



                    <div  class="row p-2">
                        <div class="col-6">
                            Email
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control w-75" id="Email"  name="Email" placeholder="Enter Email">
                        </div>
                    </div>

                    <div  class="row p-2">
                        <div class="col-6">
                            Password
                        </div>
                        <div class="col-6">
                            <input type="text" class="form-control w-75" id="Password"  name="Password" placeholder="Enter Password">
                        </div>
                    </div>
                    <p th:text="${Invalid}"></p>


                    <div class="row text-center mt-3 mb-3">
                        <div class="col-12">
                            <button class="btn btn-primary">Login</button>
                        </div>
                    </div>


                </form>



            </div>
        </div>
    </div>
</div>




</body>
</html>
