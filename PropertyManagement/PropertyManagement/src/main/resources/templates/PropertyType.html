<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
    }
    .sidebar {
        height: 100vh;
        background-color: #0d6efd;
    }
    .sidebar a {
        color: #ffffff;
        text-decoration: none;
        padding: 12px 20px;
        display: block;
    }
    .sidebar a:hover {
        background-color: rgba(255,255,255,0.2);
    }
    .card {
        border-radius: 15px;
    }
    .card i {
        font-size: 40px;
    }
</style>
</head>
<body>

<div class="container-fluid">
    <div class="row">


        <div class="col-md-2 sidebar p-0">
            <h4 class="text-center py-4 text-white">Employee Panel</h4>
            <a th:href="@{|/MainEmployee|}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
            <a th:href="@{|/Customer|}"><i class="bi bi-person-plus me-2"></i>Add Customer</a>
            <a th:href="@{|/Tenant|}"><i class="bi bi-person-plus me-2"></i>Add Tenant</a>
            <a th:href="@{|/CountryPage|}">Add Country</a>
            <a th:href="@{|/StatePage|}">Add State</a>
            <a th:href="@{|/PropertyTypes|}">Add PropertyType</a>
            <a th:href="@{|/PropertySubTypes|}">Add PropertySubType</a>
            <a th:href="@{|/PropertySizes|}">Add Property Size</a>
            <a th:href="@{|PropertyPurposes|}">Add Property Purpose</a>
            <a th:href="@{|Property|}">Add Property</a>


        </div>

        <div class="col-md-10 p-4 text-center">
            <h2 class="mb-4">PropertyType Details</h2>


            <div class="row justify-content-center mt-4">

                <div class="col-md-4">
                    <div class="card shadow">
                        <div class="card-body">
                            <h4 class="text-center mb-4"> Property Type</h4>
                            <form th:action="@{/PropertyTypess}" method="post">

                                <input type="hidden" name="PropertyTypeID"
                                       th:value="${PropertyTypeID}">

                                <div class="mb-3">
                                    <label class="form-label">Property Type Name</label>
                                    <input type="text" class="form-control" name="PropertyTypeName" placeholder="Residential / Commercial" required>
                                </div>

                                <button class="btn btn-primary w-100">
                                    Submit
                                </button>


                            </form>
    </div>
</div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
